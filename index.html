<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do-List</title>
  <link rel="stylesheet" href="main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="container">
    <h1>My To-Do List <img src="Images/accept.png"></h1>
    <div class="inputAndBtn">
      <input type="text" placeholder="Add a new task" id="taskInput">
      <button id="addTaskButton">+  Add </button>
    </div>
    <p id="erorr-msg"></p>
    <div class="select">
      <p class="tab active" id="tabAll"><img src="Images/list.png">All Tasks </p>
      <p class="tab" id="tabDone"><img src="Images/file.png">Completed</p>
    </div>
      <ul class="taskList" ul></ul>
  </div>
  <footer>
  Created by <span class="creator">Mark Ehab</span>
  </footer>
  <script  src="script.js"></script>
</body>
</html>
